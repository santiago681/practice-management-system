<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>

    <link rel="stylesheet" href="./css/style.css">
</head>

<body>

    <div class="dashboard">

        <aside class="sidebar">

            <h2>PMS</h2>

            <ul>
                <li>Inicio</li>
                <li>Usuarios</li>
                <li>Empresas</li>
            </ul>

            <button id="logoutBtn">
                Cerrar sesión
            </button>

        </aside>

        <main class="main-content">

            <h1>Dashboard</h1>

            <div class="welcome-card">
                <h3 id="welcomeName">
                    Bienvenido
                </h3>

                <p id="welcomeRole">
                    rol
                </p>
            </div>
            <div class="cards">

                <div class="card">
                    <h3>Usuarios</h3>
                    <p id="totalUsers">0</p>
                </div>

                <div class="card">
                    <h3>Empresas</h3>
                    <p>15</p>
                </div>

                <div class="card">
                    <h3>Prácticas</h3>
                    <p>32</p>
                </div>

            </div>

            <div class="table-container">

                <h2>Informacion del usuario</h2>
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Email</th>
                            <th>Rol</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody">
                        <!-- Aquí se llenará con la información del usuario -->
                    </tbody>
                    
                </table>
                <p id="message"></p>

            </div>

        </main>

    </div>

    
    <div id="editModal" class="modal">

    <div class="modal-content">

        <h2>Editar usuario</h2>

        <input
            type="text"
            id="editName"
            placeholder="Nombre"
        >

        <select id="editRole">

            <option value="student">
                Student
            </option>

            <option value="company">
                Company
            </option>

            <option value="admin">
                Admin
            </option>

        </select>

        <button id="saveBtn">
            Guardar cambios
        </button>

    </div>

</div>
    <script src="./js/dashboard.js"></script>

</body>
</html>
